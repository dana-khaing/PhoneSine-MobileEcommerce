name: Backup Restore Verification
on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 1 * *"
jobs:
  verify-backup:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: phone_sine
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping -proot" --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_NAME: phone_sine
      RESTORE_DB_NAME: phone_sine_restore_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: sudo apt-get update && sudo apt-get install -y mysql-client
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      - run: pnpm run db:migrate
        working-directory: backend
      - run: pnpm run db:backup -- backup.sql.gz
        working-directory: backend
      - run: pnpm run db:restore-test -- backup.sql.gz
        working-directory: backend
