name: Scheduled Commerce Maintenance
on:
  workflow_dispatch:
    inputs:
      job:
        description: Job to run
        required: true
        default: maintenance
        type: choice
        options: [maintenance, cleanup, notifications, reconcile, low-stock, stock-alerts]
  schedule:
    - cron: "*/10 * * * *"
    - cron: "15 7 * * *"
jobs:
  run:
    if: vars.ENABLE_SCHEDULED_MAINTENANCE == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      STRIPE_SECRET_KEY: ${{ secrets.PRODUCTION_STRIPE_SECRET_KEY }}
      EMAIL_WEBHOOK_URL: ${{ secrets.PRODUCTION_EMAIL_WEBHOOK_URL }}
      OPERATIONS_ALERT_EMAIL: ${{ vars.OPERATIONS_ALERT_EMAIL }}
      JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prod
        working-directory: backend
      - name: Select scheduled job
        id: select
        env:
          REQUESTED_JOB: ${{ inputs.job }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ -n "$REQUESTED_JOB" ]; then echo "job=$REQUESTED_JOB" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "15 7 * * *" ]; then echo "job=low-stock" >> "$GITHUB_OUTPUT"
          else echo "job=maintenance" >> "$GITHUB_OUTPUT"
          fi
      - run: node src/jobs.js "${{ steps.select.outputs.job }}"
        working-directory: backend
