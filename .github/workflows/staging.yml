name: Staging Images
on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".env.staging.example"
      - ".github/workflows/staging.yml"
      - ".github/workflows/release.yml"
      - ".env.production.example"
      - "backend/**"
      - "docker-compose.production.yml"
      - "docker-compose.staging.yml"
      - "frontend/**"
jobs:
  validate-staging:
    runs-on: ubuntu-latest
    env:
      STAGING_ENV_FILE: .env.staging.example
    steps:
      - uses: actions/checkout@v6
      - run: docker compose --env-file .env.staging.example -f docker-compose.staging.yml config --quiet
      - run: PRODUCTION_ENV_FILE=.env.production.example docker compose --env-file .env.production.example -f docker-compose.production.yml config --quiet
      - run: docker compose --env-file .env.staging.example -f docker-compose.staging.yml build
